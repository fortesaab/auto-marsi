services:
  nginx:
    image: nginx:alpine
    container_name: automarsi_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./automarsi-api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - automarsi_network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: automarsi_php
    volumes:
      - ./automarsi-api:/var/www/api
    working_dir: /var/www/api
    depends_on:
      - postgres
    networks:
      - automarsi_network

  postgres:
    image: postgres:16
    container_name: automarsi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: automarsi
      POSTGRES_USER: automarsi
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - automarsi_network

  redis:
    image: redis:7-alpine
    container_name: automarsi_redis
    ports:
      - "6379:6379"
    networks:
      - automarsi_network

volumes:
  postgres_data:

networks:
  automarsi_network:
    driver: bridge
